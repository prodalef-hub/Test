<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKARI | هویج پیر</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --orange: #FF6B35; --orange-glow: rgba(255,107,53,0.3); }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(ellipse at center, #1a0a00 0%, #0a0a0a 70%); }
        .landing-title { font-size: 4rem; font-weight: 900; background: linear-gradient(135deg, #FF6B35, #FF8C42, #FFB347); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; letter-spacing: -1px; line-height: 1.1; }
        .landing-sub { font-size: 1.8rem; font-weight: 300; color: #ccc; margin-bottom: 0.5rem; }
        .landing-sub span { color: var(--orange); font-weight: 600; }
        .landing-desc { font-size: 1rem; color: #999; max-width: 450px; margin: 1.5rem auto 2.5rem; line-height: 1.8; font-weight: 300; letter-spacing: 0.3px; text-align: center; }
        .landing-desc small { display: block; font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
        .btn-start { background: linear-gradient(135deg, var(--orange), #FF8C42); color: #fff; border: none; padding: 1rem 3.5rem; font-size: 1.2rem; font-weight: 700; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 40px var(--orange-glow); font-family: 'Inter', sans-serif; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(255, 107, 53, 0.5); }
        .btn-start:active { transform: scale(0.95); }
        .footer-credit { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-family: 'Playfair Display', serif; font-size: 0.8rem; font-weight: 400; color: rgba(255,255,255,0.2); letter-spacing: 3px; text-transform: lowercase; }
        @media (max-width: 480px) { .landing-title { font-size: 2.8rem; } .landing-sub { font-size: 1.4rem; } .landing-desc { font-size: 0.9rem; padding: 0 1rem; } .btn-start { padding: 0.8rem 2.5rem; font-size: 1rem; } }
        @media (max-width: 380px) { .landing-title { font-size: 2.2rem; } }
    </style>
</head>
<body>
    <div class="landing-title">سالامممم</div>
    <div class="landing-sub"><span>AKARI</span> (هویج پیر)</div>
    <div class="landing-desc">This place was made for Akari.<small>If you're not Akari, you should probably leave.</small></div>
    <button class="btn-start" onclick="alert('مرحله بعد: اسلایدشو!')">شروع</button>
    <div class="footer-credit">ProdbyKiya</div>
</body>
</html>
